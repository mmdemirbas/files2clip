version: "3"

vars:
  BINARY_NAME: files2clip
  BUILD_DIR: build
  DIST_DIR: dist
  VERSION: dev
  LDFLAGS: -s -w -X main.version={{.VERSION}}

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  all:
    desc: Run tests, lint, then build all distribution binaries
    cmds:
      - task: test
      - task: lint
      - task: dist

  clean:
    desc: Delete build artifacts
    platforms: [linux, darwin]
    cmds:
      - rm -rf {{.BUILD_DIR}} {{.DIST_DIR}}

  clean:windows:
    desc: Delete build artifacts (Windows)
    platforms: [windows]
    cmds:
      - cmd: powershell -Command "foreach ($d in '{{.BUILD_DIR}}','{{.DIST_DIR}}') { if (Test-Path $d) { Remove-Item -Recurse -Force $d } }"

  build:
    desc: Build for the current platform
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - CGO_ENABLED=0 go build -ldflags="{{.LDFLAGS}}" -o {{.BUILD_DIR}}/{{.BINARY_NAME}} ./cmd/files2clip

  dist:
    desc: Cross-compile for all supported platforms
    cmds:
      - mkdir -p {{.DIST_DIR}}
      - CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -ldflags="{{.LDFLAGS}}" -o {{.DIST_DIR}}/{{.BINARY_NAME}}-darwin-arm64       ./cmd/files2clip
      - CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -ldflags="{{.LDFLAGS}}" -o {{.DIST_DIR}}/{{.BINARY_NAME}}-darwin-amd64       ./cmd/files2clip
      - CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="{{.LDFLAGS}}" -o {{.DIST_DIR}}/{{.BINARY_NAME}}-windows-amd64.exe  ./cmd/files2clip
      - CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -ldflags="{{.LDFLAGS}}" -o {{.DIST_DIR}}/{{.BINARY_NAME}}-linux-amd64        ./cmd/files2clip

  test:
    desc: Run all tests
    cmds:
      - go test -v ./...

  bench:
    desc: Run benchmark tests
    cmds:
      - go test -bench=. -benchmem ./...

  lint:
    desc: Run static analysis
    cmds:
      - go vet ./...

  completions:
    desc: Generate shell completion scripts to build/completions/
    deps: [build]
    cmds:
      - mkdir -p {{.BUILD_DIR}}/completions
      - ./{{.BUILD_DIR}}/{{.BINARY_NAME}} --completion bash > {{.BUILD_DIR}}/completions/{{.BINARY_NAME}}.bash
      - ./{{.BUILD_DIR}}/{{.BINARY_NAME}} --completion zsh  > {{.BUILD_DIR}}/completions/_{{.BINARY_NAME}}
      - ./{{.BUILD_DIR}}/{{.BINARY_NAME}} --completion fish > {{.BUILD_DIR}}/completions/{{.BINARY_NAME}}.fish

  install-completions:
    desc: Install shell completions for the current shell
    deps: [completions]
    cmds:
      - |
        case "$SHELL" in
          */bash)
            dir="${BASH_COMPLETION_USER_DIR:-${XDG_DATA_HOME:-$HOME/.local/share}/bash-completion}/completions"
            mkdir -p "$dir"
            cp {{.BUILD_DIR}}/completions/{{.BINARY_NAME}}.bash "$dir/{{.BINARY_NAME}}"
            echo "Installed bash completion to $dir/{{.BINARY_NAME}}"
            ;;
          */zsh)
            dir="${fpath[1]:-/usr/local/share/zsh/site-functions}"
            cp {{.BUILD_DIR}}/completions/_{{.BINARY_NAME}} "$dir/_{{.BINARY_NAME}}" 2>/dev/null || \
              sudo cp {{.BUILD_DIR}}/completions/_{{.BINARY_NAME}} "$dir/_{{.BINARY_NAME}}"
            echo "Installed zsh completion to $dir/_{{.BINARY_NAME}}"
            ;;
          */fish)
            dir="${XDG_CONFIG_HOME:-$HOME/.config}/fish/completions"
            mkdir -p "$dir"
            cp {{.BUILD_DIR}}/completions/{{.BINARY_NAME}}.fish "$dir/{{.BINARY_NAME}}.fish"
            echo "Installed fish completion to $dir/{{.BINARY_NAME}}.fish"
            ;;
          *)
            echo "Unknown shell: $SHELL. Run 'files2clip --completion <shell>' manually."
            ;;
        esac

  setup:windows:
    desc: Install dependencies on Windows
    platforms: [windows]
    cmds:
      - echo "PowerShell is required (included with Windows). No additional dependencies needed."

  setup:unix:
    desc: Install clipboard dependency on Linux (macOS needs no extra setup)
    platforms: [linux, darwin]
    cmds:
      - |
        case "$(uname -s)" in
          Linux*)
            echo "Installing clipboard tools..."
            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get install -y xclip wl-clipboard
            elif command -v dnf >/dev/null 2>&1; then
              sudo dnf install -y xclip wl-clipboard
            elif command -v pacman >/dev/null 2>&1; then
              sudo pacman -S --noconfirm xclip wl-clipboard
            else
              echo "Please install xclip (X11) or wl-clipboard (Wayland) for your distribution."
            fi
            ;;
          Darwin*)
            echo "macOS: pbcopy is built-in. No extra setup needed."
            ;;
        esac
